name: "ground-wire"
version: "1.1.0"
competition: "grounded-reasoning"
agent:
  type: "harness"
  harness_name: "opencode"
  model: "openrouter/deepseek/deepseek-v3.2"
  prompt_template_path: "prompts/officeqa_self_crystallizing.j2"
