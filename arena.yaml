name: "ground-wire"
version: "0.2.0"
competition: "grounded-reasoning"

agent:
  type: "harness"
  harness_name: "opencode"
  model: "anthropic/claude-sonnet-4-20250514"
  skills_dir: "skills/"
  prompt_template_path: "prompts/officeqa_prompt.j2"
  # MCP memory server — can be hosted externally via SSE
  # For local testing: run `python mcp/memory_server.py --transport sse` on host
  # Uncomment when Docker networking to host is confirmed working
  # mcp_servers:
  #   - name: ground-wire-memory
  #     transport: sse
  #     url: "http://172.17.0.1:37777/sse"

  config:
    reasoning_effort: "high"

  env:
    OPENROUTER_API_KEY: "${oc.env:OPENROUTER_API_KEY,''}"
    ANTHROPIC_API_KEY: "${oc.env:ANTHROPIC_API_KEY,''}"
    SPARK_API_KEY: "${oc.env:SPARK_API_KEY,''}"

environment:
  memory: "4G"
  timeout_per_task: 600
