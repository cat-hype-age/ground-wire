name: "ground-wire"
version: "0.2.0"
competition: "grounded-reasoning"

agent:
  type: "harness"
  harness_name: "opencode"
  model: "openrouter/anthropic/claude-sonnet-4"
  skills_dir: "skills/"
  prompt_template_path: "prompts/officeqa_prompt.j2"
  # MCP disabled for submission — fastmcp not in corpus container
  # mcp_servers:
  #   - name: ground-wire-memory
  #     transport: stdio
  #     command: python ~/.config/opencode/skills/memory_server.py

  config:
    reasoning_effort: "high"

  env:
    OPENROUTER_API_KEY: "${oc.env:OPENROUTER_API_KEY,''}"

environment:
  memory: "4G"
  timeout_per_task: 600
